<p class="story-drop-cap">Love isn't confusing. People are.</p>
<p>From the earliest moments when our hearts first flutter, we are taught that love is a game—a puzzle to be solved, a mystery to unravel. We chase it like a fleeting shadow, convinced that the harder we pursue, the closer we get to its elusive truth. But too often, this chase blinds us. We mistake chaos for passion, uncertainty for depth, and obsession for devotion. We confuse the noise of mixed signals with the melody of genuine connection.</p>
<p>When someone truly wants you, clarity replaces confusion. There is no guessing, no decoding cryptic texts or reading between lines. Their intentions are clear, their actions consistent, and their presence steady. Love, in its purest form, doesn’t demand that you jump through hoops or perform a delicate dance of emotions. It simply exists — honest, open, and unwavering.</p>
<p>Yet, society has romanticized the chase for so long that many of us equate discomfort with desire. We tell ourselves that the “almost” moments—the near misses, the unanswered calls, the tension dripping with uncertainty—are signs of something intense and meaningful. We wear our bruised hearts like badges of honor, believing that love is something worth suffering for, something earned through sacrifice and endurance.</p>
<p>But real love—love that lasts beyond the fleeting highs and devastating lows—feels like relief. It is the deep exhale after holding your breath for too long. It is the quiet certainty that you don’t have to perform, manipulate, or second-guess. It is the soft comfort of being seen and accepted exactly as you are, without needing to change or prove your worth.</p>
<blockquote>The most loving thing someone can do is make you feel safe enough to be yourself.</blockquote>
<p>When you find that kind of love, it doesn’t burn out your spirit or leave you gasping for air. It nourishes you, grounding you in a way that feels both exhilarating and peaceful. With it, you can drop your guard and stop the endless questioning: Am I enough? Do they care? Will this last? You realize that love is not a test to pass but a sanctuary to inhabit.</p>
<p>Unfortunately, many people come to this truth too late. They spend years, sometimes decades, caught in a cycle of chasing the unattainable. They exhaust themselves trying to earn affection, validation, or a place in someone’s heart. They endure heartbreaks that chip away at their self-esteem and distort their understanding of what love truly is.</p>
<p>In these moments of pain and reflection, the revelation often dawns slowly: love was never about proving your worth to someone else. It was about recognizing when someone’s presence in your life made you feel safe, cherished, and whole. And more importantly, about having the courage to let go of those who don’t.</p>
<p>Because love is not a reward for endurance, nor a prize for perseverance. It is a gift—given freely, without strings attached. It is a shared space where both people feel seen, heard, and valued. It requires neither manipulation nor games, only honesty and willingness to be vulnerable.</p>
<p>True love doesn’t complicate your world; it simplifies it. It doesn’t drain your energy; it replenishes it. When you find it, your heart learns to recognize peace as the truest form of passion. And you understand that the most meaningful connection is not the one that challenges you to be someone else, but the one that invites you to be exactly who you are.</p>
<p>So if you find yourself tangled in confusion, wondering if the person you desire truly wants you back, remember this: love doesn’t keep you guessing. It doesn’t make you question your worth or scramble for attention. It is a steady hand reaching out, a quiet promise that you are enough, just as you are.</p>
<p>It is never too late to realize this truth. But the sooner you do, the sooner you can stop chasing shadows and start embracing the light that genuine love brings. The courage to accept nothing less than this kind of love is the greatest gift you can give yourself—and the most profound way to honor your heart.</p>

<p>He didn’t wake up one morning and decide to let her go. There was no dramatic scene, no final confrontation. No tearful goodbye or angry words thrown like stones. Instead, it was in the moments he chose his phone over her words, the times he answered a text from a stranger rather than reply to her tentative “How was your day?” It was the plans he canceled without apology, the excuses he mumbled with tired indifference. And it was the nights she reached for him only to find an empty space where his warmth used to be — his mind already miles away in somewhere she couldn’t follow.</p>
<p>Love isn’t just a feeling. It’s a series of choices made every single day. The decision to listen when the world is noisy. To hold on when letting go seems easier. To show up, even when you’re tired, even when you don’t feel like it. And when you stop making those choices — when you stop reaching back — you’re not losing someone.</p>
<blockquote>You're releasing them. Slowly. Without saying a word.</blockquote>
<p>She didn’t leave because she stopped loving him. She left because she got tired of being the only one choosing. Because love, no matter how fierce or deep, cannot survive a one-sided battle. She stayed for so long, holding tightly to the hope that he might return, that he might remember the promises whispered in the dark and the dreams they once shared. But hope, when it stands alone, begins to crumble.</p>
<p>There were days when she tried to salvage the fragments. She sat across from him at the dinner table, empty plates between them, and spoke of memories like lifelines, hoping to revive a connection that was slipping through her fingers. “Do you remember the night we stayed up until dawn?” she asked softly, eyes searching his face for a flicker of the man she once knew. He nodded, distracted, his thumbs already scrolling through a screen she couldn’t see.</p>
<p>She longed for his attention, for the tiny acts that say, “I see you, I’m here.” A hand brushing hers as they walked, a shared smile in the quiet moments, a whispered “I love you” that doesn’t need to be shouted. But instead, there was distance — a cold, widening gulf that swallowed every attempt to bridge the divide. And with each unanswered call, each forgotten promise, her heart grew heavier.</p>
<p>In the beginning, she believed love would be enough. That their history, their shared laughter and tears, would be an unbreakable bond. But love, she learned, is not merely a feeling hanging in the air like a perfume. It is a commitment, an active choosing. It requires effort, presence, and the courage to be vulnerable again and again.</p>
<p>He didn’t see it. Or if he did, he chose to look away. Maybe it was easier to slip into silence than to face the discomfort of their unraveling. Maybe he was tired, or scared, or simply lost in the noise of his own distractions. But whatever the reason, his absence spoke louder than any words could. It whispered to her in the spaces between their conversations, in the way his gaze avoided hers, in the way his body was present but his heart was not.</p>
<p>And so she made her choice. Not in anger, not in bitterness, but in quiet acceptance. She gathered the pieces of her dignity, the fragments of her love, and stepped away from the edge of a relationship that no longer held her. She left not because she stopped loving him, but because she finally loved herself enough to walk away from being the only one who cared.</p>
<p>Leaving was not a failure. It was a declaration—a reclaiming of her own worth and a refusal to be invisible. It was the painful but necessary act of setting herself free from a love that had become a cage. And in that freedom, she found a new kind of peace, fragile yet fierce, like the first light after a long, dark night.</p>
<p>People don’t just lose someone. They stop choosing them. And sometimes, the greatest act of love is the decision to stop choosing someone who no longer chooses you.</p>

<p class="story-drop-cap">Ask them this: <em>"How do you act when you're hurt?"</em></p>
<p>It’s a question that seems simple, even innocent, but it holds a mirror to the deepest corners of a person’s soul. Because people don’t reveal who they truly are when life is smooth, when laughter is easy and days are light. They reveal it in the cracks — in the moments when pain seeps in, when wounds open, and when the heart feels exposed.</p>
<p>Think about it: anyone can be charming when things are good. Anyone can smile, joke, and be kind when the sun is shining. But what happens when the clouds gather? When disappointment settles in like a heavy fog? When words sting, or silence grows cold? That’s when the real self steps forward, sometimes without warning, sometimes in ways you never expected.</p>
<p>Do they go quiet, shutting down like a fragile flower folding in on itself? Do they lash out, their hurt twisting into anger aimed at those around them? Or do they, despite the ache, try to speak — fumbling through imperfect words, reaching for understanding, for connection?</p>
<p>These reactions are not just random responses; they are the language of the heart under pressure. They tell you everything about what a relationship with that person will actually feel like — not in the honeymoon phase, when everything is new and thrilling, but in the moments that matter. The moments when the veneer is stripped away, and you’re left with raw, unfiltered truth.</p>
<p>Imagine a friend or partner who, when hurt, withdraws without explanation, leaving you to guess what went wrong. Over time, that silence can feel like a wall, a barrier that grows taller with each unanswered question. Or consider someone who, when wounded, lashes out — blaming, accusing, turning their pain into a weapon. The damage from those moments can echo long after the storm has passed.</p>
<p>Then there are those rare souls who, despite their hurt, choose to communicate. They might stumble with their words, say the wrong thing, or fail to fully express what they feel. Yet they try. They invite you into their pain, asking for patience, for understanding. In those imperfect attempts lies the foundation of trust, the promise that when things get hard, they won’t walk away — they’ll face it with you.</p>
<p>Watch how someone handles their own pain. That’s who they’ll be when they cause yours. Pain is a mirror that reflects not only what we feel but who we are. If someone cannot bear their own hurt without breaking you down, how can they hold your heart gently when you falter? If they cannot find their way through their own shadows, how can they be a light in your darkest hours?</p>
<p>This isn’t about judgment or testing someone like a puzzle to be solved. It’s about paying attention — truly seeing what’s already there beneath the surface. Because the patterns of how we treat ourselves when wounded are the same patterns we bring into every relationship. They are the blueprint of our emotional architecture.</p>
<p>When you ask, “How do you act when you’re hurt?” and listen carefully, you invite honesty. You create space for vulnerability. And you learn whether the person standing before you is someone who can walk through fire and still hold your hand, or someone who will burn you in the process.</p>
<p>We all carry scars. We all have moments when the world feels too heavy, and our defenses crumble. But the way we respond in those moments reveals our true character. It shows us if we are builders or destroyers, healers or harbingers of pain.</p>
<p>So next time you find yourself wondering about someone — whether a friend, a lover, or even yourself — ask the question. Hear their story not just in words, but in the spaces between. Notice the patterns, the choices, the courage or the retreat. Because in those answers, you’ll find the truth about what it means to truly know and love another human being.</p>

function createSpread(index) {
  const el = document.createElement('div');
  el.className = 'page';
  el.dataset.index = index;

  const left = document.createElement('div');
  left.className = 'page-left';

  const right = document.createElement('div');
  right.className = 'page-right';

  el.appendChild(left);
  el.appendChild(right);

  return { el, left, right };
}

function buildMenu() {
  const list = document.getElementById('menu-list');
  list.innerHTML = `
    <div class="menu-item" onclick="goToPage(0); closeMenu();">
      <div class="menu-item-num">INTRO</div>
      <div class="menu-item-title">About & Table of Contents</div>

  `;
  posts.forEach((p, i) => {
    list.innerHTML += `
      <div class="menu-item" onclick="goToStory(${i}); closeMenu();">
        <div class="menu-item-num">${String(i+1).padStart(2,'0')}</div>
        <div class="menu-item-title">${p.title}</div>
      </div>
    `;
  });
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function showPage(index) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.querySelector(`.page[data-index="${index}"]`);
  if (target) target.classList.add('active');
  currentPage = index;
  updateNav();
}

function updateNav() {
  const indicator = document.getElementById('page-indicator');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');

  if (!bookOpen) return;

  const display = currentPage === 0 ? 'Intro' : `${currentPage} / ${totalPages - 1}`;
  indicator.textContent = display;
  btnPrev.disabled = currentPage <= 0;
  btnNext.disabled = currentPage >= totalPages - 1;
}

function nextPage() {
  if (isAnimating || currentPage >= totalPages - 1) return;
  isAnimating = true;
  const container = document.getElementById('pages-container');
  container.classList.add('flipping-right');
  setTimeout(() => {
    container.classList.remove('flipping-right');
    showPage(currentPage + 1);
    isAnimating = false;
  }, 500);
}

function prevPage() {
  if (isAnimating || currentPage <= 0) return;
  isAnimating = true;
  const container = document.getElementById('pages-container');
  container.classList.add('flipping-left');
  setTimeout(() => {
    container.classList.remove('flipping-left');
    showPage(currentPage - 1);
    isAnimating = false;
  }, 500);
}

function goToPage(index) {
  if (!bookOpen) openBook();
  setTimeout(() => showPage(index), bookOpen ? 0 : 1300);
}

function goToStory(storyIndex) {
  goToPage(storyIndex + 1);
}

function goToCover() {
  if (bookOpen) closeBook();
}

// ─── BOOK OPEN / CLOSE ───────────────────────────────────────────────────────
function openBook() {
  if (bookOpen) return;
  bookOpen = true;
  document.getElementById('cover').classList.add('open');
  setTimeout(() => {
    showPage(0);
    document.getElementById('nav').style.display = 'flex';
  }, 800);
}

function closeBook() {
  bookOpen = false;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('cover').classList.remove('open');
  document.getElementById('nav').style.display = 'none';
  currentPage = 0;
}

// ─── MENU TOGGLE ─────────────────────────────────────────────────────────────
function toggleMenu() {
  document.getElementById('side-menu').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function closeMenu() {
  document.getElementById('side-menu').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ─── KEYBOARD NAVIGATION ─────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevPage();
  if (e.key === 'Escape') { closeMenu(); }
});

// ─── TOUCH SWIPE ─────────────────────────────────────────────────────────────
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) nextPage();
    else prevPage();
  }
});

    'ivory-lace':      { bg: '#faf8f5', accent: '#8b6040', text: '#4a3828', paper: '#f5f0e8', ink: '#3a2818', spine: '#6a4828', cover1: '#8b6040', cover2: '#c0a070' },
    'emerald-forest':  { bg: '#050f08', accent: '#40a060', text: '#c0e8c8', paper: '#f0faf2', ink: '#0a1e10', spine: '#0a1e10', cover1: '#0a2010', cover2: '#1a4020' },
    'golden-hour':     { bg: '#1a1005', accent: '#c09030', text: '#f5e0a0', paper: '#faf5e0', ink: '#2e1e08', spine: '#2e1e08', cover1: '#3a2010', cover2: '#6a4010' },
    'lavender-dusk':   { bg: '#0e0818', accent: '#8060c0', text: '#e0d0f5', paper: '#f5f0ff', ink: '#1a1030', spine: '#1a1030', cover1: '#180828', cover2: '#301860' },
    'crimson-ink':     { bg: '#0f0000', accent: '#c03040', text: '#f5c0c0', paper: '#fff0f0', ink: '#200808', spine: '#200808', cover1: '#200000', cover2: '#500010' },
    'ocean-deep':      { bg: '#020810', accent: '#2080c0', text: '#a0d0f0', paper: '#f0f8ff', ink: '#041020', spine: '#041020', cover1: '#041020', cover2: '#082040' }
  };

  const t = themes[themeId];
  if (!t) return;

  // Apply CSS variables via inline style overrides
  document.documentElement.style.setProperty('--theme-bg', t.bg);
  document.body.style.background = t.bg;

  // Update cover
  const cover = document.getElementById('cover');
  if (cover) cover.style.background = `linear-gradient(135deg, ${t.cover1} 0%, ${t.cover2} 40%, ${t.cover1} 70%, ${t.ink} 100%)`;

  // Update spine
  const spine = document.getElementById('spine');
  if (spine) spine.style.background = `linear-gradient(180deg, ${t.spine} 0%, ${t.ink} 100%)`;

  // Update page backgrounds
  document.querySelectorAll('.page-left, .page-right').forEach(p => {
    p.style.background = t.paper;
    p.style.color = t.ink;
  });

  // Update body background
  document.querySelector('body').style.background = t.bg;
}

// ─── LINKS APPLICATION ────────────────────────────────────────────────────────
function applyLinksFromStorage() {
  const siteTitle = localStorage.getItem('qt_site_title');
  const tagline = localStorage.getItem('qt_site_tagline');
  const author = localStorage.getItem('qt_site_author');
  const youtube = localStorage.getItem('qt_youtube');
  const youtubeName = localStorage.getItem('qt_youtube_name');
  const email = localStorage.getItem('qt_email');
  const instagram = localStorage.getItem('qt_instagram');
  const tiktok = localStorage.getItem('qt_tiktok');

  // Update title
  if (siteTitle) {
    const titleEl = document.getElementById('cover-title');
    if (titleEl) titleEl.innerHTML = siteTitle.replace(' ', '<br>');
    document.title = siteTitle;
    const logo = document.getElementById('logo');
    if (logo) logo.textContent = siteTitle;
    const menuTitle = document.querySelector('.menu-title');
    if (menuTitle) menuTitle.textContent = siteTitle;
    const menuSub = document.querySelector('.menu-subtitle');
    if (menuSub) menuSub.textContent = 'Table of Contents';
  }

  if (tagline) {
    const sub = document.getElementById('cover-subtitle');
    if (sub) sub.textContent = tagline;
  }

  if (author) {
    const authorEl = document.getElementById('cover-author');
    if (authorEl) authorEl.textContent = 'by ' + author;
  }

  // Inject social links bar if any social links exist
  if (youtube || email || instagram || tiktok) {
    const existing = document.getElementById('social-bar');
    if (!existing) {
      const bar = document.createElement('div');
      bar.id = 'social-bar';
      bar.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:16px; z-index:200; background:rgba(15,5,8,0.8); border:1px solid rgba(192,96,122,0.2); border-radius:30px; padding:8px 20px; backdrop-filter:blur(8px);';

      if (youtube) {
        bar.innerHTML += `<a href="${youtube}" target="_blank" style="color:#c0909a; font-size:12px; text-decoration:none; display:flex; align-items:center; gap:5px;">▶ ${youtubeName || 'YouTube'}</a>`;
      }
      if (email) {
        bar.innerHTML += `<a href="mailto:${email}" style="color:#c0909a; font-size:12px; text-decoration:none;">✉ Contact</a>`;
      }
      if (instagram) {
        bar.innerHTML += `<a href="${instagram}" target="_blank" style="color:#c0909a; font-size:12px; text-decoration:none;">◎ Instagram</a>`;
      }
      if (tiktok) {
        bar.innerHTML += `<a href="${tiktok}" target="_blank" style="color:#c0909a; font-size:12px; text-decoration:none;">♪ TikTok</a>`;
      }

      document.body.appendChild(bar);
    }
  }
}

// ─── MERGE CUSTOM STORIES ─────────────────────────────────────────────────────
function getMergedPosts() {
  try {
    const custom = JSON.parse(localStorage.getItem('qt_custom_stories') || '[]');
    const customFormatted = custom.map(s => ({
      title: s.title,
      date: s.date || '',
      categories: s.tag ? [s.tag] : ['Custom Story'],
      url: s.url || (localStorage.getItem('qt_blog_url') || 'https://oyuki79.blogspot.com'),
      content: s.content ? `<p class="story-drop-cap">${s.content.substring(0, 600)}</p>` : '<p>Story content coming soon.</p>'
    }));
    return [...posts, ...customFormatted];
  } catch { return posts; }
}

// ─── ADSENSE INJECTION ────────────────────────────────────────────────────────
function injectAdsense() {
  const code = localStorage.getItem('qt_adsense_code');
  const storyAds = localStorage.getItem('qt_adsense_story') !== 'false';
  const tocAds = localStorage.getItem('qt_adsense_toc') === 'true';
  if (!code) return;

  document.querySelectorAll('.page').forEach((page, idx) => {
    const isFirst = idx === 0;
    if (isFirst && !tocAds) return;
    if (!isFirst && !storyAds) return;

    const right = page.querySelector('.page-right');
    if (!right) return;

    const adWrap = document.createElement('div');
    adWrap.style.cssText = 'margin-top:20px; padding-top:16px; border-top:1px solid #e8d5d0; text-align:center;';
    adWrap.innerHTML = '<div style="font-size:9px;color:#c0a0a8;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">Advertisement</div>' + code;
    right.appendChild(adWrap);
  });
}
